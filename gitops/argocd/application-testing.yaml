# ArgoCD Application for Testing Environment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: anita-agent-testing
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/emil/anita-agent.git
    targetRevision: develop
    path: gitops/overlays/testing
  destination:
    server: https://kubernetes.default.svc
    namespace: testing-anita-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
