# GitOps Base Configuration
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- namespace.yaml
- deployment.yaml
- service.yaml
- configmap.yaml
- serviceaccount.yaml
- rbac.yaml

commonLabels:
  app.kubernetes.io/name: anita-agent
  app.kubernetes.io/managed-by: gitops

images:
- name: anita-agent
  newName: ghcr.io/emil/anita-agent
  newTag: latest
