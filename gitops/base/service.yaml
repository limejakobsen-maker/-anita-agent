# Base Service for Anita Agent
apiVersion: v1
kind: Service
metadata:
  name: anita-agent
  labels:
    app: anita-agent
spec:
  selector:
    app: anita-agent
  ports:
  - port: 8080
    targetPort: 8080
    name: http
    protocol: TCP
  - port: 8765
    targetPort: 8765
    name: websocket
    protocol: TCP
  type: ClusterIP
