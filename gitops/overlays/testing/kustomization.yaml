# Testing Environment Overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: testing-anita-agent

resources:
- ../../base

namePrefix: testing-
nameSuffix: -v1

commonLabels:
  environment: testing
  version: v1

images:
- name: anita-agent
  newName: ghcr.io/emil/anita-agent
  newTag: develop-latest

replicas:
- name: anita-agent
  count: 1

patches:
- target:
    kind: Deployment
    name: anita-agent
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: "256Mi"
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: "100m"
    - op: replace
      path: /spec/template/spec/containers/0/env/0/value
      value: "testing"

configMapGenerator:
- name: anita-agent-config
  behavior: merge
  literals:
  - ENVIRONMENT=testing
  - LOG_LEVEL=debug
  - TESTING_MODE=true
