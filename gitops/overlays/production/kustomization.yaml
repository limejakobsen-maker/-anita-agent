# Production Environment Overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: anita-agent

resources:
- ../../base

commonLabels:
  environment: production
  version: stable

images:
- name: anita-agent
  newName: ghcr.io/emil/anita-agent
  newTag: v1.0.0  # Updated by CI/CD

replicas:
- name: anita-agent
  count: 3

patches:
- target:
    kind: Deployment
    name: anita-agent
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: "1Gi"
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: "500m"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: "4Gi"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: "2000m"

configMapGenerator:
- name: anita-agent-config
  behavior: merge
  literals:
  - ENVIRONMENT=production
  - LOG_LEVEL=info
  - TESTING_MODE=false
