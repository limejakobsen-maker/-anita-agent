# Anita Agent - Komplett CI/CD Pipeline
# Bygger, tester, og deployer automatisk til Kubernetes

name: 🚀 Anita Agent CI/CD

on:
  push:
    branches: [ main, develop, feature/* ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]

# Miljøvariabler brukt i hele pipelinen
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/anita-agent
  PYTHON_VERSION: '3.11'
  
# Permissions for GitHub Container Registry
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════════
  # STAGE 1: CODE QUALITY
  # ═══════════════════════════════════════════════════════════════
  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: 📦 Install linting tools
      run: |
        pip install black flake8 isort bandit pylint mypy
        pip install -r requirements.txt || echo "No requirements.txt"
    
    - name: ⚫ Check Black formatting
      run: |
        echo "=== Checking Black formatting ==="
        black --check --diff . || {
          echo "::warning::Code is not formatted with Black. Run 'black .' locally."
          exit 0
        }
      continue-on-error: true
    
    - name: 📊 Check import sorting (isort)
      run: |
        echo "=== Checking import order ==="
        isort --check-only --diff . || {
          echo "::warning::Imports not sorted. Run 'isort .' locally."
          exit 0
        }
      continue-on-error: true
    
    - name: 🔎 Run Flake8 linting
      run: |
        echo "=== Running Flake8 ==="
        flake8 . --count --statistics \
          --max-line-length=100 \
          --extend-ignore=E203,W503 \
          --exclude=.git,__pycache__,build,dist,*.egg-info,venv
    
    - name: 🛡️ Security scan with Bandit
      run: |
        echo "=== Running Bandit security scan ==="
        bandit -r . \
          -f json \
          -o bandit-report.json \
          --skip B101 \
          --exclude ./tests,./venv,./.git,./build,./dist || true
        
        # Also output to console
        bandit -r . \
          --skip B101 \
          --exclude ./tests,./venv,./.git,./build,./dist \
          -ll || true
    
    - name: 📤 Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: bandit-report.json
        retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # STAGE 2: TESTING
  # ═══════════════════════════════════════════════════════════════
  test:
    name: 🧪 Testing
    runs-on: ubuntu-latest
    needs: code-quality
    
    strategy:
      matrix:
        test-type: [unit, integration]
      fail-fast: false
    
    services:
      # PostgreSQL for integration tests
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: anita_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      # Redis for caching tests
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-xdist pytest-timeout pytest-mock
        pip install pytest-cov pytest-html
        pip install requests websockets pyyaml
        pip install -r requirements.txt || echo "No requirements.txt"
    
    - name: 🧪 Run ${{ matrix.test-type }} tests
      env:
        DATABASE_URL: postgresql://test:test@localhost:5432/anita_test
        REDIS_URL: redis://localhost:6379/0
        ENVIRONMENT: testing
        PYTHONPATH: ${{ github.workspace }}
      run: |
        echo "=== Running ${{ matrix.test-type }} tests ==="
        pytest tests/${{ matrix.test-type }} \
          -v \
          --tb=short \
          --strict-markers \
          --cov=. \
          --cov-report=xml:coverage-${{ matrix.test-type }}.xml \
          --cov-report=html:htmlcov-${{ matrix.test-type }} \
          --cov-report=term-missing:skip-covered \
          --cov-fail-under=80 \
          --junitxml=junit-${{ matrix.test-type }}.xml \
          -m "${{ matrix.test-type }}" \
          -n auto \
          --timeout=300
    
    - name: 📊 Generate test report
      if: always()
      run: |
        pytest tests/${{ matrix.test-type }} \
          --html=report-${{ matrix.test-type }}.html \
          --self-contained-html || true
    
    - name: 📤 Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.test-type }}
        path: |
          junit-${{ matrix.test-type }}.xml
          report-${{ matrix.test-type }}.html
          htmlcov-${{ matrix.test-type }}/
          coverage-${{ matrix.test-type }}.xml
        retention-days: 30
    
    - name: 📈 Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      if: matrix.test-type == 'unit'
      with:
        files: ./coverage-unit.xml
        flags: ${{ matrix.test-type }}
        name: ${{ matrix.test-type }}-coverage
        fail_ci_if_error: false

  # ═══════════════════════════════════════════════════════════════
  # STAGE 3: BUILD & PUSH
  # ═══════════════════════════════════════════════════════════════
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 🔐 Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 🏷️ Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
    
    - name: 🏗️ Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
        build-args: |
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          VCS_REF=${{ github.sha }}
          VERSION=${{ github.ref_name }}
    
    - name: 📝 Output image info
      run: |
        echo "Image built: ${{ steps.meta.outputs.tags }}"
        echo "Digest: ${{ steps.build.outputs.digest }}"

  # ═══════════════════════════════════════════════════════════════
  # STAGE 4: DEPLOY TO TESTING
  # ═══════════════════════════════════════════════════════════════
  deploy-testing:
    name: 🚀 Deploy to Testing
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/')
    environment:
      name: testing
      url: http://testing.anita-agent.local
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ☸️ Setup K3d
      uses: nolar/setup-k3d-k3s@v1
      with:
        version: v1.28
        github-token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 🏥 Verify cluster
      run: |
        echo "=== Cluster Info ==="
        kubectl cluster-info
        kubectl get nodes
    
    - name: 🏗️ Create namespace
      run: |
        kubectl apply -f k8s/namespaces/testing-namespace.yaml
    
    - name: 🔑 Create image pull secret
      run: |
        kubectl create secret docker-registry ghcr-secret \
          --namespace=testing-anita-agent \
          --docker-server=ghcr.io \
          --docker-username=${{ github.actor }} \
          --docker-password=${{ secrets.GITHUB_TOKEN }} \
          --dry-run=client -o yaml | kubectl apply -f -
    
    - name: 📝 Update image tag
      run: |
        IMAGE_TAG="ghcr.io/${{ github.repository }}/anita-agent:develop-${{ github.sha }}"
        sed -i "s|newTag:.*|newTag: develop-${{ github.sha }}|g" k8s/ci-cd/overlays/testing/kustomization.yaml
        echo "Deploying image: $IMAGE_TAG"
    
    - name: 🚀 Deploy to testing
      run: |
        kubectl apply -k k8s/ci-cd/overlays/testing/
    
    - name: ⏳ Wait for rollout
      run: |
        kubectl rollout status deployment/anita-agent \
          -n testing-anita-agent \
          --timeout=300s
    
    - name: 🧪 Run smoke tests
      run: |
        echo "=== Running smoke tests ==="
        kubectl run smoke-test --rm -i --restart=Never \
          --namespace=testing-anita-agent \
          --image=curlimages/curl:latest \
          -- http://anita-agent:8080/health || echo "Health check may need time"
    
    - name: 📊 Get deployment status
      run: |
        echo "=== Deployment Status ==="
        kubectl get all -n testing-anita-agent
        echo ""
        echo "=== Pod Logs ==="
        kubectl logs -n testing-anita-agent -l app=anita-agent --tail=50 || true

  # ═══════════════════════════════════════════════════════════════
  # STAGE 5: DEPLOY TO PRODUCTION (GitOps)
  # ═══════════════════════════════════════════════════════════════
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://anita-agent.local
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 📝 Update GitOps repository
      run: |
        IMAGE_TAG="${{ github.sha }}"
        
        echo "Updating production image tag to: $IMAGE_TAG"
        sed -i "s|newTag:.*|newTag: $IMAGE_TAG|g" gitops/overlays/production/kustomization.yaml
        
        # Vis endringen
        cat gitops/overlays/production/kustomization.yaml
    
    - name: 💾 Commit changes
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add gitops/
        
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "ci: update production image to ${{ github.sha }}

        Automated deployment triggered by commit ${{ github.sha }}
        
        [skip ci]"
          git push
        fi
    
    - name: 🔄 Trigger GitOps sync
      run: |
        echo "=== GitOps Update Complete ==="
        echo "Image: ghcr.io/${{ github.repository }}/anita-agent:${{ github.sha }}"
        echo ""
        echo "Flux/ArgoCD will automatically sync the changes."
        echo "Monitor deployment status in your GitOps dashboard."
    
    - name: 🏷️ Create release tag
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: 🚀 Release v${{ github.run_number }}
        body: |
          Automated release from commit ${{ github.sha }}
          
          ## Changes
          ${{ github.event.head_commit.message }}
          
          ## Docker Image
          ```
          ghcr.io/${{ github.repository }}/anita-agent:${{ github.sha }}
          ```
        draft: false
        prerelease: false

  # ═══════════════════════════════════════════════════════════════
  # STAGE 6: REPORTING & CLEANUP
  # ═══════════════════════════════════════════════════════════════
  report:
    name: 📊 Report & Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-testing, deploy-production]
    if: always()
    
    steps:
    - name: 📥 Download artifacts
      uses: actions/download-artifact@v4
      continue-on-error: true
    
    - name: 📋 Generate summary
      run: |
        echo "# CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Testing | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Deploy Testing | ${{ needs.deploy-testing.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Deploy Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
    
    - name: 🧹 Cleanup old images
      uses: actions/delete-package-versions@v4
      with:
        package-name: anita-agent
        package-type: container
        min-versions-to-keep: 10
        delete-only-untagged-versions: true
      continue-on-error: true
