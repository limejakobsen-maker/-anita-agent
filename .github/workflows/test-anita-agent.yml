# GitHub Actions Workflow for Anita Agent CI/CD Pipeline
# Author: Kimi Code CLI
# Date: 2026-03-17

name: Anita Agent CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
    paths:
      - '**.py'
      - 'k8s/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'requirements*.txt'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.py'
      - 'k8s/**'
      - 'tests/**'
      - 'requirements*.txt'

env:
  PYTHON_VERSION: '3.11'
  KUBECONFIG: ${{ github.workspace }}/kubeconfig
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/anita-agent

jobs:
  # ============================================================================
  # STAGE 1: Code Quality & Security Checks
  # ============================================================================
  code-quality:
    name: 🔍 Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install linting tools
      run: |
        pip install flake8 black isort bandit pylint
    
    - name: Run Black (formatting check)
      run: black --check --diff .
      continue-on-error: true
    
    - name: Run isort (import sorting check)
      run: isort --check-only --diff .
      continue-on-error: true
    
    - name: Run Flake8 (linting)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Run Bandit (security scanning)
      run: bandit -r . -f json -o bandit-report.json || true
    
    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: bandit-report.json
        retention-days: 30

  # ============================================================================
  # STAGE 2: Automated Testing
  # ============================================================================
  test:
    name: 🧪 Automated Testing
    runs-on: ubuntu-latest
    needs: code-quality
    
    strategy:
      matrix:
        test-type: [unit, integration]
    
    services:
      # PostgreSQL for integration tests
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: anita_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      # Redis for caching tests
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
    
    - name: Run ${{ matrix.test-type }} tests with pytest
      env:
        DATABASE_URL: postgresql://test:test@localhost:5432/anita_test
        REDIS_URL: redis://localhost:6379/0
        ENVIRONMENT: testing
      run: |
        pytest tests/${{ matrix.test-type }} \
          -v \
          --tb=short \
          --cov=. \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --junitxml=junit-${{ matrix.test-type }}.xml \
          -m "${{ matrix.test-type }}"
    
    - name: Generate test report
      run: |
        pytest tests/${{ matrix.test-type }} \
          --html=report-${{ matrix.test-type }}.html \
          --self-contained-html || true
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.test-type }}
        path: |
          junit-${{ matrix.test-type }}.xml
          report-${{ matrix.test-type }}.html
          htmlcov/
        retention-days: 30
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: ${{ matrix.test-type }}
        name: ${{ matrix.test-type }}-coverage

  # ============================================================================
  # STAGE 3: Build & Push Docker Image
  # ============================================================================
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          VCS_REF=${{ github.sha }}

  # ============================================================================
  # STAGE 4: Deploy to Testing Environment (K3d)
  # ============================================================================
  deploy-testing:
    name: 🚀 Deploy to Testing (K3d)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/')
    environment:
      name: testing
      url: http://testing.anita-agent.local
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up K3d
      uses: nolar/setup-k3d-k3s@v1
      with:
        version: v1.28
        github-token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Verify K3d cluster
      run: |
        kubectl cluster-info
        kubectl get nodes
    
    - name: Create testing namespace
      run: |
        kubectl apply -f k8s/namespaces/testing-namespace.yaml
    
    - name: Deploy to testing
      run: |
        # Update image tag in deployment
        sed -i 's|IMAGE_TAG|${{ github.sha }}|g' k8s/ci-cd/testing-deployment.yaml
        kubectl apply -k k8s/ci-cd/overlays/testing/
    
    - name: Wait for deployment
      run: |
        kubectl rollout status deployment/anita-agent -n testing-anita-agent --timeout=300s
    
    - name: Run smoke tests
      run: |
        kubectl run smoke-test --rm -i --restart=Never \
          --image=curlimages/curl:latest \
          -- http://anita-agent.testing-anita-agent.svc.cluster.local:8080/health
    
    - name: Get deployment info
      run: |
        kubectl get all -n testing-anita-agent
        kubectl describe deployment anita-agent -n testing-anita-agent

  # ============================================================================
  # STAGE 5: Deploy to Production (GitOps)
  # ============================================================================
  deploy-production:
    name: 🚀 Deploy to Production (GitOps)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://anita-agent.local
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Update GitOps repository
      run: |
        # Update image tag in GitOps overlay
        sed -i 's|newTag:.*|newTag: ${{ github.sha }}|g' gitops/overlays/production/kustomization.yaml
        
        # Commit changes
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add gitops/
        git commit -m "ci: update production image to ${{ github.sha }} [skip ci]"
        git push
    
    - name: Sync with ArgoCD/Flux
      run: |
        # Trigger GitOps sync (if using ArgoCD API)
        curl -X POST ${{ secrets.ARGOCD_API_URL }}/api/v1/applications/anita-agent/sync \
          -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
          -d '{}' || echo "ArgoCD sync not configured"
    
    - name: Verify production deployment
      run: |
        echo "Deployment triggered via GitOps"
        echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

  # ============================================================================
  # STAGE 6: Generate Reports
  # ============================================================================
  report:
    name: 📊 Generate Reports
    runs-on: ubuntu-latest
    needs: [test, deploy-testing]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Generate combined report
      run: |
        mkdir -p reports
        echo "# Anita Agent CI/CD Report" > reports/summary.md
        echo "Date: $(date)" >> reports/summary.md
        echo "Commit: ${{ github.sha }}" >> reports/summary.md
        echo "" >> reports/summary.md
        echo "## Test Results" >> reports/summary.md
        echo "- Unit Tests: ${{ needs.test.result }}" >> reports/summary.md
        echo "- Integration Tests: ${{ needs.test.result }}" >> reports/summary.md
    
    - name: Upload combined report
      uses: actions/upload-artifact@v4
      with:
        name: ci-cd-report
        path: reports/
        retention-days: 90
    
    - name: Create GitHub Release (on main branch)
      if: github.ref == 'refs/heads/main' && success()
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false

  # ============================================================================
  # STAGE 7: Cleanup
  # ============================================================================
  cleanup:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-testing, report]
    if: always() && needs.deploy-testing.result == 'success'
    
    steps:
    - name: Delete old images (keep last 10)
      uses: actions/delete-package-versions@v4
      with:
        package-name: ${{ env.IMAGE_NAME }}
        package-type: container
        min-versions-to-keep: 10
        delete-only-untagged-versions: true
