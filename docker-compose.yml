# ════════════════════════════════════════════════════════════════════════
# Docker Compose for lokal utvikling og testing
# ════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ════════════════════════════════════════════════════════════════════
  # Anita Agent API
  # ════════════════════════════════════════════════════════════════════
  anita-agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: anita-agent
    ports:
      - "8080:8080"
      - "8765:8765"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/anita
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./:/app
      - /app/__pycache__
      - /app/.pytest_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - anita-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════
  # PostgreSQL Database
  # ════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: anita-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anita
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - anita-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════
  # Redis Cache
  # ════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: anita-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - anita-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════
  # Test Runner (kjører tester i isolert miljø)
  # ════════════════════════════════════════════════════════════════════
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: testing
    container_name: anita-tests
    environment:
      - ENVIRONMENT=testing
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/anita_test
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - anita-network
    profiles:
      - testing
    command: pytest -v

volumes:
  postgres-data:
  redis-data:

networks:
  anita-network:
    driver: bridge
