# ════════════════════════════════════════════════════════════════════════
# Production Deployment Patch
# ════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: anita-agent
spec:
  replicas: 3
  template:
    spec:
      containers:
      - name: anita-agent
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
